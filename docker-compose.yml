version: '3.9'
services:
  postgres:
    image: postgres:16
    container_name: ai_learning_postgres
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: ai_learning_os
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data

  qdrant:
    image: qdrant/qdrant:v1.12.6
    container_name: ai_learning_qdrant
    ports:
      - "6333:6333"
      - "6334:6334"
    volumes:
      - qdrant_data:/qdrant/storage

  redis:
    image: redis:7
    container_name: ai_learning_redis
    ports:
      - "6379:6379"

volumes:
  postgres_data:
  qdrant_data:
